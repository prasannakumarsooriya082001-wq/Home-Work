<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link id="theme" rel="stylesheet" href="/HomeWork/Profile/white.css">
</head>

<body>
    <section>
        <h1>My Profile</h1>
        <img src="/Practice/manager.png" alt="Profile Picture" width="100" height="100">
        <p>Name: Prasanna Kumar</p>
        <p>Email: prasanna@gmail.com</p>
        <p>Role: Software Developer</p>
        <button id="Btn">Dark Mode</button>
    </section>

    <script>
        let btn = document.getElementById("Btn");
        btn.addEventListener("click", function () {
            let theme = document.getElementById("theme");
            if (theme.getAttribute("href") === "/HomeWork/Profile/white.css") 
            {
                theme.setAttribute("href", "/HomeWork/Profile/Dark.css");
                btn.textContent = "Light Mode";
            } 
            else 
            {
                theme.setAttribute("href", "/HomeWork/Profile/white.css");
                btn.textContent = "Dark Mode";
            }
        });
    </script>
</body>

</html>
